<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/api/prototypes/_shared?path=tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { overflow: hidden; }
  #root { height: 100vh; }
  /* Loud failure surface — shown by harness.js when something goes wrong */
  #proto-error {
    display: none;
    position: fixed; inset: 0; z-index: 99999;
    padding: 24px 28px; overflow: auto;
    background: #1a0e0e; color: #ffd7d7;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px; line-height: 1.55; white-space: pre-wrap;
  }
  #proto-error h2 { margin: 0 0 12px; font-family: Inter, system-ui, sans-serif; font-size: 16px; color: #ff8a8a; }
</style>
</head>
<body>
  <div id="root"></div>
  <pre id="proto-error"></pre>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <script src="/api/prototypes/_shared?path=fixtures.js"></script>
  <script src="/api/prototypes/_shared?path=harness.js"></script>
</body>
</html>
